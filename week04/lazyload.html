<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazyloading Images</title>
    <meta name="author" content="Jorge Lima">

    <!-- CSS link -->
    <link rel="stylesheet" href="styles/lazyload.css">
</head>
<body>

    <header>
        <h1>Lazy Load Images</h1>
    </header>

    <main>
        <picture>
            <img src="images/image1.jpg" alt="Balrog vs Glorfindel" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/image2.jpg" alt="Smaug" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/image3.jpg" alt="You shall not pass!" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/image4.jpg" alt="Gandalf in the Shire" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/image5.jpg" alt="The Mûmakil attack" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="images/image6.jpg" alt="Galadriel" loading="lazy" width="400" height="600">
        </picture>

    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Jorge Lima</p>
        <p id="lastModified"></p>
    </footer>

    <script src="scripts/lazyload.js"></script>

</body>
</html>
